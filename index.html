<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>文字バイナリ変換</title>
    <meta name="theme-color" content="#2367d1">
    <meta name="description" content="文字とバイナリを相互変換できるオフライン対応PWAです。">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">Text Binary Converter</p>
            <h1 id="app-title">文字バイナリ変換</h1>
          </div>
          <div class="status-strip" aria-live="polite">
            <span id="char-count">0 chars</span>
            <span id="byte-count">0 bytes</span>
            <span id="bit-count">0 bits</span>
            <button class="install-button" id="install-app" type="button" hidden>Install</button>
          </div>
        </header>

        <div class="controls" aria-label="変換設定">
          <div class="segmented" role="tablist" aria-label="変換方向">
            <button class="segment active" id="text-to-binary" type="button" role="tab" aria-selected="true">Text → Binary</button>
            <button class="segment" id="binary-to-text" type="button" role="tab" aria-selected="false">Binary → Text</button>
          </div>

          <label class="select-wrap">
            <span>形式</span>
            <select id="encoding-mode">
              <option value="utf8">UTF-8 bytes</option>
              <option value="codepoint">Unicode code point</option>
            </select>
          </label>

          <label class="select-wrap">
            <span>区切り</span>
            <select id="separator-mode">
              <option value="space">Space</option>
              <option value="none">None</option>
              <option value="newline">New line</option>
            </select>
          </label>
        </div>

        <div class="converter-grid">
          <section class="panel input-panel" aria-labelledby="input-title">
            <div class="panel-head">
              <h2 id="input-title">入力</h2>
              <button class="ghost-button" id="clear-input" type="button" title="クリア">Clear</button>
            </div>
            <textarea id="source-text" spellcheck="false" placeholder="ここに文字を入力"></textarea>
          </section>

          <section class="panel output-panel" aria-labelledby="output-title">
            <div class="panel-head">
              <h2 id="output-title">出力</h2>
              <div class="button-row">
                <button class="ghost-button" id="copy-output" type="button" title="コピー">Copy</button>
                <button class="ghost-button" id="download-output" type="button" title="ダウンロード">Save</button>
              </div>
            </div>
            <textarea id="output-text" spellcheck="false" readonly placeholder="変換結果"></textarea>
          </section>
        </div>

        <section class="visualizer" aria-label="ビットプレビュー">
          <canvas id="bit-canvas" width="1040" height="180"></canvas>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
